{% extends "base.html" %}
{% block title %}Edit User{% endblock %}
{% block content %}
<div class="container py-5" style="max-width: 600px;">
  <h1 style="text-transform: uppercase; font-weight: 800;">Edit User</h1>
  <form method="POST" class="mt-4">
    <div class="mb-3">
      <label for="name" class="form-label">Name</label>
      <input type="text" class="form-control" id="name" name="name" value="{{ user.name }}" required>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="is_admin" name="is_admin" {{ 'checked' if user.is_admin }}>
      <label class="form-check-label" for="is_admin">Administrator</label>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-uia-primary">Save</button>
      <a href="{{ url_for('dashboard.user_detail', user_id=user.id) }}" class="btn btn-uia-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
